<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pembagian Kelas Siswa Baru SMP ABBS 2026/2027</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Inter,sans-serif;
  background:linear-gradient(135deg,#f0fdfa 0%,#f8fafc 50%,#eff6ff 100%);
  color:#0f172a;min-height:100vh
}
body::before,body::after{
  content:'';position:fixed;border-radius:50%;z-index:-1;pointer-events:none
}
body::before{
  width:400px;height:400px;background:radial-gradient(circle,rgba(13,115,119,.08),transparent 70%);
  top:-150px;right:-100px
}
body::after{
  width:300px;height:300px;background:radial-gradient(circle,rgba(124,58,237,.06),transparent 70%);
  bottom:-100px;left:-80px
}
.header{
  background:linear-gradient(135deg,#0d7377 0%,#0f8a8f 50%,#14a3a8 100%);
  padding:28px 20px 36px;text-align:center;position:relative;overflow:hidden
}
.header::after{
  content:'';position:absolute;inset:0;
  background:url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 5L35 20H50L38 30L43 45L30 35L17 45L22 30L10 20H25Z' fill='rgba(255,255,255,.04)'/%3E%3C/svg%3E") repeat;
  opacity:.3
}
.header .logo{width:52px;height:52px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,.25);margin-bottom:10px;position:relative}
.header h1{font-size:18px;font-weight:800;color:#fff;letter-spacing:.5px;line-height:1.4;position:relative}
.header .sub{font-size:12px;color:rgba(255,255,255,.8);margin-top:4px;position:relative}
.content{max-width:720px;margin:-20px auto 0;padding:0 12px 20px;position:relative}
.search-wrap{
  background:#fff;border-radius:12px;padding:4px 4px 4px 16px;
  display:flex;align-items:center;gap:8px;
  box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:12px;
  border:1px solid #e2e8f0;transition:border-color .2s,box-shadow .2s
}
.search-wrap:focus-within{border-color:#0d7377;box-shadow:0 2px 12px rgba(13,115,119,.12)}
.search-wrap .icon{color:#94a3b8;font-size:15px;flex-shrink:0}
.search-wrap input{
  flex:1;border:none;background:transparent;padding:10px 0;
  font-size:14px;font-family:inherit;color:#0f172a;outline:none
}
.search-wrap input::placeholder{color:#94a3b8}
.search-wrap .clear{
  display:none;border:none;background:#f1f5f9;color:#64748b;
  cursor:pointer;padding:5px 10px;border-radius:6px;font-size:12px;font-family:inherit;
  transition:background .2s;white-space:nowrap;margin-right:2px
}
.search-wrap .clear.show{display:block}
.search-wrap .clear:hover{background:#e2e8f0}
.tab-bar{
  background:#fff;border-radius:12px;padding:5px;display:flex;gap:3px;
  box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:12px;
  border:1px solid #e2e8f0;transition:opacity .2s
}
.tab-bar.mencari{opacity:.45;pointer-events:none}
.tab{
  flex:1;text-align:center;padding:10px 0;border-radius:8px;
  font-size:13px;font-weight:600;color:#64748b;cursor:pointer;
  transition:all .25s;border:none;background:none;font-family:inherit
}
.tab:hover{color:#0d7377;background:#f0fdfa}
.tab.active{
  background:linear-gradient(135deg,#0d7377,#0f8a8f);color:#fff;
  box-shadow:0 2px 6px rgba(13,115,119,.3)
}
.kelas-card{
  background:#fff;border-radius:14px;
  box-shadow:0 1px 4px rgba(0,0,0,.05);overflow:hidden;
  border:1px solid #e2e8f0;animation:fadeUp .3s ease
}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.kelas-header{
  display:flex;justify-content:space-between;align-items:center;
  padding:16px 18px;background:linear-gradient(135deg,#f8fafc,#f1f5f9)
}
.kelas-header .kiri{display:flex;align-items:center;gap:10px}
.kelas-header .kode{
  font-weight:700;font-size:13px;color:#fff;
  background:linear-gradient(135deg,var(--warna),var(--warna2));
  padding:3px 14px;border-radius:14px;letter-spacing:.3px
}
.kelas-header .kode.semua{background:linear-gradient(135deg,#64748b,#94a3b8)}
.kelas-header .info{font-size:13px;color:#475569;font-weight:500}
.kelas-header .count{
  font-size:12px;color:#94a3b8;background:#f1f5f9;
  padding:3px 12px;border-radius:12px
}
.card-body{padding:0 0 2px}
table{width:100%;border-collapse:collapse;font-size:14px}
th{
  font-size:11px;color:#94a3b8;font-weight:600;
  padding:10px 18px;text-align:left;
  border-bottom:1px solid #f1f5f9;
  letter-spacing:.5px;text-transform:uppercase
}
td{padding:11px 18px;border-bottom:1px solid #f8fafc;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr{transition:background .15s}
tr:hover td{background:#f0fdfa}
tr:nth-child(even) td{background:#fafbfc}
tr:nth-child(even):hover td{background:#f0fdfa}
.no-col{color:#cbd5e1;width:24px;text-align:center;font-size:12px;font-weight:500}
.nama{font-weight:500;color:#0f172a;display:flex;align-items:center;gap:8px}
.nama .avatar{
  display:inline-flex;width:26px;height:26px;border-radius:50%;
  align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:#fff;flex-shrink:0
}
.badge-kelas{
  display:inline-block;padding:2px 10px;border-radius:10px;
  font-size:11px;font-weight:700;color:#fff;margin-left:auto;flex-shrink:0
}
.empty{
  text-align:center;padding:32px 18px;color:#94a3b8;font-size:13px
}
.loading{text-align:center;padding:80px 20px}
.spinner{
  display:inline-block;width:30px;height:30px;
  border:3px solid #e2e8f0;border-top-color:#0d7377;
  border-radius:50%;animation:spin .7s linear infinite
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{color:#94a3b8;font-size:13px;margin-top:10px}
.error{text-align:center;padding:60px 20px}
.error-icon{font-size:36px;margin-bottom:6px}
.error-text{color:#ef4444;font-weight:600;font-size:14px}
.error-detail{color:#94a3b8;font-size:13px;margin:6px 0 14px}
.btn-retry{
  background:#0d7377;color:#fff;border:none;
  padding:8px 22px;border-radius:8px;cursor:pointer;
  font-size:13px;font-family:inherit;transition:background .2s
}
.btn-retry:hover{background:#0f8a8f}
.footer{text-align:center;padding:18px;color:#94a3b8;font-size:11px}
.footer a{color:#0d7377;text-decoration:none}
.footer a:hover{text-decoration:underline}
@media(max-width:480px){
  .header{padding:24px 16px 32px}
  .header h1{font-size:15px}
  .tab{font-size:12px;padding:8px 0}
  td,th{padding:8px 14px;font-size:13px}
  .kelas-header{padding:12px 14px}
  .kelas-header .info{font-size:12px}
  .search-wrap{padding:2px 2px 2px 12px}
  .search-wrap input{font-size:13px;padding:8px 0}
}
</style>
</head>
<body>

<div class="header">
  <img class="logo" src="https://i.ibb.co.com/yFn890yV/logo-smpabbs.png" alt="logo smpabbs">
  <h1>PEMBAGIAN KELAS SISWA BARU</h1>
  <div class="sub">SMP ABBS SURAKARTA — TAHUN AJARAN 2026/2027</div>
</div>

<div class="content" id="app">
  <div class="loading">
    <div class="spinner"></div>
    <div class="loading-text">Memuat data...</div>
  </div>
</div>

<div class="footer" id="footer"></div>

<script>
// ── DATA SOURCE ──
var DATA_URL = 'https://cdn.jsdelivr.net/gh/smpabbs/pps-pembagian-kelas@main/data.json';

// ── HELPERS ──
function parseDate(str) {
  if (!str) return 99999999;
  var p = str.split('/');
  return p.length === 3 ? +p[2]*10000 + +p[1]*100 + +p[0] : 99999999;
}
function sortByDate(a,b) { return parseDate(a.tgl_daftar) - parseDate(b.tgl_daftar); }

// ── CLASS DIVISION ──
function calculateClasses(siswa) {
  var l = siswa.filter(function(s){ return s.program.endsWith('-L'); }).sort(sortByDate);
  var pr = siswa.filter(function(s){ return s.program.endsWith('-P'); }).sort(sortByDate);
  function get(p,a){ return a.filter(function(s){ return s.program === p; }); }
  return {
    '7A': [].concat(get('ICT-L',l).slice(0,26), get('VCP-L',l).slice(0,3)),
    '7B': [].concat(get('ICT-L',l).slice(26,52), get('VCP-L',l).slice(3,6)),
    '7C': [].concat(get('ICT-L',l).slice(52), get('TCP-L',l), get('VCP-L',l).slice(6)),
    '7D': [].concat(get('ICT-P',pr)),
    '7E': [].concat(get('TCP-P',pr), get('VCP-P',pr))
  };
}

var KELAS_INFO = {'7A':'Putra 1','7B':'Putra 2','7C':'Putra 3','7D':'Putri 1','7E':'Putri 2'};
var KELAS_WARNA = {'7A':['#0d7377','#0f8a8f'],'7B':['#1a6b8a','#1f8ab0'],'7C':['#2a5a2a','#3d7a3d'],'7D':['#b45309','#d97706'],'7E':['#7c3aed','#a855f7']};
var KELAS_URUT = ['7A','7B','7C','7D','7E'];

// ── STATE ──
var data = null;
var loading = true;
var loadErr = null;
var tabAktif = '7A';

// ── FETCH DATA ──
async function init() {
  loading = true; loadErr = null; render();
  try {
    var r = await fetch(DATA_URL);
    if (!r.ok) throw new Error('Gagal memuat (HTTP ' + r.status + ')');
    data = await r.json();
    loading = false;
    render();
  } catch(e) {
    loading = false;
    loadErr = e.message;
    render();
  }
}

// ── TAB SWITCH ──
function pilih(k) {
  tabAktif = k;
  var inp = document.getElementById('searchInput');
  if (inp) { inp.value = ''; }
  var btn = document.getElementById('clearBtn');
  if (btn) btn.classList.remove('show');
  renderTable();
  highlightTab();
  var card = document.getElementById('card-container');
  if (card) card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function highlightTab() {
  var tabs = document.querySelectorAll('.tab');
  for (var i = 0; i < tabs.length; i++) {
    tabs[i].classList.toggle('active', tabs[i].dataset.kelas === tabAktif);
  }
}

// ── RENDER ──
function render() {
  var app = document.getElementById('app');
  var ft = document.getElementById('footer');

  if (loading) {
    app.innerHTML = '<div class="loading"><div class="spinner"></div><div class="loading-text">Memuat data...</div></div>';
    ft.innerHTML = '';
    return;
  }
  if (loadErr) {
    app.innerHTML = '<div class="error"><div class="error-icon">⚠️</div><div class="error-text">Gagal memuat data</div><div class="error-detail">' + loadErr + '</div><button class="btn-retry" onclick="init()">🔄 Coba Lagi</button></div>';
    ft.innerHTML = '';
    return;
  }
  if (!data || !data.siswa || !data.siswa.length) {
    app.innerHTML = '<div class="error"><div class="error-text">Data tidak tersedia</div></div>';
    return;
  }

  // Tabs
  var html = '<div class="tab-bar" id="tabBar">';
  for (var i = 0; i < KELAS_URUT.length; i++) {
    var k = KELAS_URUT[i];
    html += '<button class="tab' + (tabAktif === k ? ' active' : '') + '" data-kelas="' + k + '" onclick="pilih(\'' + k + '\')">' + k + '</button>';
  }
  html += '</div>';

  // Search bar
  html += '<div class="search-wrap">' +
    '<span class="icon">🔍</span>' +
    '<input type="text" id="searchInput" placeholder="Cari nama siswa di semua kelas..." oninput="cariSiswa(this)" autocomplete="off">' +
    '<button class="clear" id="clearBtn" onclick="resetCari()">✕ Hapus</button>' +
    '</div>';

  // Card container
  html += '<div id="card-container"></div>';

  app.innerHTML = html;
  renderTable();

  ft.innerHTML = 'Data: ' + (data.per_tanggal || '-') + ' • <a href="https://pps2627.vercel.app" target="_blank">Admin</a>';
}

// ── SEARCH ──
function cariSiswa(input) {
  var q = input.value.trim();
  var btn = document.getElementById('clearBtn');
  if (btn) btn.classList.toggle('show', q.length > 0);

  var tabBar = document.getElementById('tabBar');
  if (tabBar) tabBar.classList.toggle('mencari', q.length > 0);

  renderTable(q);
}

function resetCari() {
  var inp = document.getElementById('searchInput');
  if (inp) { inp.value = ''; }
  var btn = document.getElementById('clearBtn');
  if (btn) btn.classList.remove('show');

  var tabBar = document.getElementById('tabBar');
  if (tabBar) tabBar.classList.remove('mencari');

  renderTable('');
}

// ── RENDER TABLE ──
function renderTable(query) {
  if (!data || !data.siswa) return;
  if (query === undefined) query = '';

  var kls = calculateClasses(data.siswa);
  var q = query.toLowerCase().trim();

  // ── Jika search aktif: cari di SEMUA kelas ──
  if (q) {
    // Kumpulkan hasil dari semua kelas
    var semuaHasil = [];
    for (var i = 0; i < KELAS_URUT.length; i++) {
      var k = KELAS_URUT[i];
      var siswaDiKelas = kls[k] || [];
      for (var j = 0; j < siswaDiKelas.length; j++) {
        if (siswaDiKelas[j].nama.toLowerCase().indexOf(q) !== -1) {
          semuaHasil.push({ siswa: siswaDiKelas[j], kelas: k });
        }
      }
    }

    // Kelompokkan per kelas
    var byKelas = {};
    for (var i = 0; i < semuaHasil.length; i++) {
      var h = semuaHasil[i];
      if (!byKelas[h.kelas]) byKelas[h.kelas] = [];
      byKelas[h.kelas].push(h.siswa);
    }

    // Hitung total
    var totalHasil = semuaHasil.length;
    var totalSiswa = 0;
    for (var i = 0; i < KELAS_URUT.length; i++) {
      totalSiswa += (kls[KELAS_URUT[i]] || []).length;
    }

    // Build rows per kelas
    var allRows = '';
    var urutKelas = KELAS_URUT.filter(function(k){ return byKelas[k]; });
    for (var i = 0; i < urutKelas.length; i++) {
      var k = urutKelas[i];
      var list = byKelas[k];
      var w = KELAS_WARNA[k] || ['#0d7377','#0f8a8f'];
      var warnaBadge = w[0];

      // Header grup kelas
      allRows += '<tr style="background:#f1f5f9"><td colspan="2" style="padding:8px 18px;font-size:12px;font-weight:700;color:' + warnaBadge + ';letter-spacing:.3px">' +
        '▸ ' + k + ' — ' + KELAS_INFO[k] + ' <span style="color:#94a3b8;font-weight:400">(' + list.length + ')</span></td></tr>';

      for (var j = 0; j < list.length; j++) {
        var s = list[j];
        var namaArr = s.nama.split(' ');
        var inisial = (namaArr[0] ? namaArr[0][0] : '') + (namaArr[1] ? namaArr[1][0] : '');
        var warna = j % 3 === 0 ? '#0d7377' : (j % 3 === 1 ? '#7c3aed' : '#b45309');
        allRows += '<tr><td class="no-col">' + (j + 1) + '</td><td class="nama">' +
          '<span class="avatar" style="background:' + warna + '">' + inisial + '</span>' + s.nama +
          '</td></tr>';
      }
    }

    var card = document.getElementById('card-container');
    if (!card) return;

    card.innerHTML =
      '<div class="kelas-card">' +
        '<div class="kelas-header">' +
          '<div class="kiri">' +
            '<span class="kode semua" style="background:linear-gradient(135deg,#64748b,#94a3b8)">🔍</span>' +
            '<span class="info">Hasil pencarian</span>' +
          '</div>' +
          '<span class="count">' + totalHasil + '/' + totalSiswa + ' siswa</span>' +
        '</div>' +
        '<div class="card-body"><table>' +
          '<thead><tr><th style="width:24px">No</th><th>Nama Siswa</th></tr></thead><tbody>' +
          (allRows || '<tr><td colspan="2"><div class="empty">Tidak ada siswa dengan nama "' + query + '"</div></td></tr>') +
          '</tbody></table></div>' +
      '</div>';

    return;
  }

  // ── Normal: tampilkan tab aktif ──
  var siswa = kls[tabAktif] || [];

  var w = KELAS_WARNA[tabAktif] || ['#0d7377','#0f8a8f'];
  var info = KELAS_INFO[tabAktif] || '';

  var rows = '';
  if (siswa.length === 0) {
    rows = '<tr><td colspan="2"><div class="empty">Belum ada siswa</div></td></tr>';
  } else {
    for (var i = 0; i < siswa.length; i++) {
      var s = siswa[i];
      var namaArr = s.nama.split(' ');
      var inisial = (namaArr[0] ? namaArr[0][0] : '') + (namaArr[1] ? namaArr[1][0] : '');
      var warna = i % 3 === 0 ? '#0d7377' : (i % 3 === 1 ? '#7c3aed' : '#b45309');
      rows += '<tr><td class="no-col">' + (i + 1) + '</td><td class="nama"><span class="avatar" style="background:' + warna + '">' + inisial + '</span>' + s.nama + '</td></tr>';
    }
  }

  var card = document.getElementById('card-container');
  if (!card) return;

  card.innerHTML =
    '<div class="kelas-card">' +
      '<div class="kelas-header">' +
        '<div class="kiri">' +
          '<span class="kode" style="--warna:' + w[0] + ';--warna2:' + w[1] + '">' + tabAktif + '</span>' +
          '<span class="info">' + info + '</span>' +
        '</div>' +
        '<span class="count">' + siswa.length + ' siswa</span>' +
      '</div>' +
      '<div class="card-body"><table>' +
        '<thead><tr><th style="width:24px">No</th><th>Nama Siswa</th></tr></thead><tbody>' +
        rows +
        '</tbody></table></div>' +
    '</div>';
}

// ── START ──
init();
</script>
</body>
</html>
