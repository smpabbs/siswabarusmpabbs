<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pembagian Kelas Siswa Baru SMP ABBS 2026/2027</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}

/* ── VARIABLES ── */
:root{
  --bg:#0c1222;
  --bg2:#111827;
  --bg3:#1a2235;
  --bg4:#1e293b;
  --border:#2a3346;
  --text:#e2e8f0;
  --text2:#94a3b8;
  --text3:#64748b;
  --accent:#d4a853;
  --accent2:#c4953a;
  --accent-glow:rgba(212,168,83,.12);
  --shadow:0 4px 24px rgba(0,0,0,.3);
}
/* ── WELCOME ── */
.welcome-overlay{
  position:fixed;inset:0;z-index:9999;
  background:radial-gradient(ellipse at center, #0f1a2e 0%, #080e1a 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px;text-align:center;
  transition:opacity .6s ease,visibility .6s ease
}
.welcome-overlay.hidden{opacity:0;visibility:hidden;pointer-events:none}
.welcome-overlay .star{
  position:absolute;border-radius:50%;background:#fff;opacity:0;
  animation:twinkle var(--d,3s) ease-in-out infinite var(--delay,0s)
}
@keyframes twinkle{
  0%,100%{opacity:0;transform:scale(.5)}
  50%{opacity:.6;transform:scale(1)}
}
.welcome-overlay .logo-w{width:64px;height:64px;border-radius:50%;object-fit:cover;margin-bottom:18px;position:relative;z-index:1;border:2px solid rgba(212,168,83,.25);box-shadow:0 0 30px rgba(212,168,83,.1)}
.welcome-overlay .ayat{
  font-size:20px;font-weight:600;color:var(--accent);line-height:1.6;
  max-width:460px;position:relative;z-index:1;
  font-family:'Times New Roman',serif;
  text-shadow:0 0 40px rgba(212,168,83,.08)
}
.welcome-overlay .arti{
  font-size:13px;color:var(--text2);margin-top:12px;
  max-width:400px;line-height:1.7;position:relative;z-index:1
}
.welcome-overlay .sumber{
  font-size:11px;color:var(--text3);margin-top:6px;position:relative;z-index:1;font-style:italic
}
.welcome-overlay .btn-masuk{
  margin-top:28px;padding:12px 40px;border-radius:10px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#0c1222;font-weight:700;font-size:14px;border:none;
  cursor:pointer;transition:all .3s;position:relative;z-index:1;
  font-family:inherit;letter-spacing:.5px;box-shadow:0 4px 20px rgba(212,168,83,.2)
}
.welcome-overlay .btn-masuk:hover{
  transform:translateY(-2px);box-shadow:0 6px 30px rgba(212,168,83,.3)
}
.welcome-overlay .btn-masuk:active{transform:translateY(0)}

/* ── BODY ── */
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Inter,sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh
}
.header{
  background:linear-gradient(135deg,#0f1a2e 0%,#162240 50%,#1a2a42 100%);
  padding:28px 20px 36px;text-align:center;position:relative;overflow:hidden;
  border-bottom:1px solid var(--border)
}
.header::after{
  content:'';position:absolute;inset:0;
  background:url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 5L35 20H50L38 30L43 45L30 35L17 45L22 30L10 20H25Z' fill='rgba(212,168,83,.04)'/%3E%3C/svg%3E") repeat;opacity:.3
}
.header .logo{width:52px;height:52px;border-radius:50%;object-fit:cover;border:2px solid rgba(212,168,83,.2);margin-bottom:10px;position:relative}
.header h1{font-size:18px;font-weight:800;color:var(--text);letter-spacing:.5px;line-height:1.4;position:relative}
.header .sub{font-size:12px;color:var(--text2);margin-top:4px;position:relative}
.content{max-width:720px;margin:-20px auto 0;padding:0 12px 20px;position:relative}

/* ── SEARCH ── */
.search-wrap{
  background:var(--bg3);border-radius:12px;padding:4px 4px 4px 16px;
  display:flex;align-items:center;gap:8px;
  box-shadow:var(--shadow);margin-bottom:12px;
  border:1px solid var(--border);transition:border-color .2s,box-shadow .2s
}
.search-wrap:focus-within{border-color:var(--accent);box-shadow:0 2px 16px var(--accent-glow)}
.search-wrap .icon{color:var(--text3);font-size:15px;flex-shrink:0}
.search-wrap input{
  flex:1;border:none;background:transparent;padding:10px 0;
  font-size:14px;font-family:inherit;color:var(--text);outline:none
}
.search-wrap input::placeholder{color:var(--text3)}
.search-wrap .clear{
  display:none;border:none;background:var(--bg4);color:var(--text2);
  cursor:pointer;padding:5px 10px;border-radius:6px;font-size:12px;font-family:inherit;
  transition:background .2s;white-space:nowrap;margin-right:2px
}
.search-wrap .clear.show{display:block}
.search-wrap .clear:hover{background:#334155}

/* ── TABS ── */
.tab-bar{
  background:var(--bg3);border-radius:12px;padding:5px;display:flex;gap:3px;
  box-shadow:var(--shadow);margin-bottom:12px;border:1px solid var(--border);
  transition:opacity .2s
}
.tab-bar.mencari{opacity:.45;pointer-events:none}
.tab{
  flex:1;text-align:center;padding:10px 0;border-radius:8px;
  font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;
  transition:all .25s;border:none;background:none;font-family:inherit
}
.tab:hover{color:var(--text);background:var(--bg4)}
.tab.active{
  background:linear-gradient(135deg,#1a2a42,#243b5a);color:var(--accent);
  box-shadow:0 2px 8px rgba(0,0,0,.2)
}

/* ── CARD ── */
.kelas-card{
  background:var(--bg3);border-radius:14px;
  box-shadow:var(--shadow);overflow:hidden;
  border:1px solid var(--border);animation:fadeUp .3s ease
}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.kelas-header{
  display:flex;justify-content:space-between;align-items:center;
  padding:16px 18px;background:linear-gradient(135deg,var(--bg2),var(--bg3));
  border-bottom:1px solid var(--border)
}
.kelas-header .kiri{display:flex;align-items:center;gap:10px}
.kelas-header .kode{
  font-weight:700;font-size:13px;color:var(--accent);
  background:var(--bg4);padding:3px 14px;border-radius:14px;
  letter-spacing:.3px;border:1px solid rgba(212,168,83,.15)
}
.kelas-header .kode.semua{background:var(--bg4);border-color:var(--text3);color:var(--text2)}
.kelas-header .info{font-size:13px;color:var(--text2);font-weight:500}
.kelas-header .count{
  font-size:12px;color:var(--text3);background:var(--bg4);
  padding:3px 12px;border-radius:12px
}
.card-body{padding:0 0 2px}
table{width:100%;border-collapse:collapse;font-size:14px}
th{
  font-size:11px;color:var(--text3);font-weight:600;
  padding:10px 18px;text-align:left;
  border-bottom:1px solid var(--border);
  letter-spacing:.5px;text-transform:uppercase
}
td{padding:11px 18px;border-bottom:1px solid rgba(42,51,70,.5);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(212,168,83,.04)}
tr:nth-child(even) td{background:rgba(255,255,255,.015)}
tr:nth-child(even):hover td{background:rgba(212,168,83,.04)}
.no-col{color:var(--text3);width:24px;text-align:center;font-size:12px;font-weight:500}
.nama{font-weight:500;color:var(--text);display:flex;align-items:center;gap:8px}
.nama .avatar{
  display:inline-flex;width:26px;height:26px;border-radius:50%;
  align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:#fff;flex-shrink:0;
  box-shadow:0 2px 6px rgba(0,0,0,.2)
}
.badge-kelas{
  display:inline-block;padding:2px 10px;border-radius:10px;
  font-size:11px;font-weight:700;color:#fff;margin-left:auto;flex-shrink:0
}
.grup-header td{
  padding:8px 18px;font-size:12px;font-weight:700;letter-spacing:.3px;
  background:var(--bg2);color:var(--accent)
}
.empty{
  text-align:center;padding:32px 18px;color:var(--text3);font-size:13px
}
.loading{text-align:center;padding:80px 20px}
.spinner{
  display:inline-block;width:30px;height:30px;
  border:3px solid var(--border);border-top-color:var(--accent);
  border-radius:50%;animation:spin .7s linear infinite
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{color:var(--text3);font-size:13px;margin-top:10px}
.error{text-align:center;padding:60px 20px}
.error-icon{font-size:36px;margin-bottom:6px}
.error-text{color:#ef4444;font-weight:600;font-size:14px}
.error-detail{color:var(--text3);font-size:13px;margin:6px 0 14px}
.btn-retry{
  background:var(--accent);color:#0c1222;border:none;
  padding:8px 22px;border-radius:8px;cursor:pointer;
  font-size:13px;font-family:inherit;font-weight:600;transition:background .2s
}
.btn-retry:hover{background:var(--accent2)}
.footer{text-align:center;padding:18px;color:var(--text3);font-size:11px}
.footer a{color:var(--accent);text-decoration:none}
.footer a:hover{text-decoration:underline}
@media(max-width:480px){
  .header{padding:24px 16px 32px}
  .header h1{font-size:15px}
  .tab{font-size:12px;padding:8px 0}
  td,th{padding:8px 14px;font-size:13px}
  .kelas-header{padding:12px 14px}
  .kelas-header .info{font-size:12px}
  .search-wrap{padding:2px 2px 2px 12px}
  .search-wrap input{font-size:13px;padding:8px 0}
  .welcome-overlay .ayat{font-size:17px}
}
</style>
</head>
<body>

<!-- ══════ WELCOME SCREEN ══════ -->
<div class="welcome-overlay" id="welcomeScreen">
  <div class="star" style="width:2px;height:2px;top:12%;left:15%;--d:3.2s;--delay:.5s"></div>
  <div class="star" style="width:1.5px;height:1.5px;top:8%;right:22%;--d:2.8s;--delay:1.2s"></div>
  <div class="star" style="width:2.5px;height:2.5px;top:25%;left:72%;--d:4s;--delay:.2s"></div>
  <div class="star" style="width:1px;height:1px;top:60%;left:10%;--d:3.5s;--delay:2s"></div>
  <div class="star" style="width:2px;height:2px;bottom:30%;right:15%;--d:2.5s;--delay:1s"></div>
  <div class="star" style="width:1.5px;height:1.5px;bottom:20%;left:25%;--d:3.8s;--delay:.8s"></div>
  <div class="star" style="width:2px;height:2px;top:40%;right:8%;--d:3s;--delay:1.5s"></div>
  <div class="star" style="width:1px;height:1px;top:70%;right:35%;--d:2.2s;--delay:.3s"></div>
  <div class="star" style="width:2.5px;height:2.5px;bottom:15%;right:60%;--d:4.2s;--delay:1.8s"></div>
  <div class="star" style="width:1.5px;height:1.5px;top:50%;left:5%;--d:3.1s;--delay:.9s"></div>

  <img class="logo-w" src="https://i.ibb.co.com/yFn890yV/logo-smpabbs.png" alt="logo smpabbs">

  <div class="ayat">
  خَيْرُ النَّاسِ أَنْفَعُهُمْ لِلنَّاسِ
  </div>
  <div class="arti">
  "Sebaik-baik manusia adalah yang paling bermanfaat bagi manusia lainnya."
  </div>
  <div class="sumber">— HR. Ahmad, Ath-Thabrani, Al-Mu'jam Al-Ausath</div>

  <button class="btn-masuk" onclick="masuk()">بِسْمِ اللَّهِ — MASUK</button>
</div>

<!-- ══════ MAIN ══════ -->
<div class="header">
  <img class="logo" src="https://i.ibb.co.com/yFn890yV/logo-smpabbs.png" alt="logo smpabbs">
  <h1>PEMBAGIAN KELAS SISWA BARU</h1>
  <div class="sub">SMP ABBS SURAKARTA — TAHUN AJARAN 2026/2027</div>
</div>

<div class="content" id="app">
  <div class="loading">
    <div class="spinner"></div>
    <div class="loading-text">Memuat data...</div>
  </div>
</div>

<div class="footer" id="footer"></div>

<script>
// ── WELCOME ──
function masuk() {
  document.getElementById('welcomeScreen').classList.add('hidden');
  if (data) { render(); }
  else if (!loading) { init(); }
  // Kalau loading masih jalan, nanti render otomatis pas selesai
}

// ── DATA SOURCE ──
var DATA_URL = 'https://cdn.jsdelivr.net/gh/smpabbs/pps-pembagian-kelas@main/data.json';

// ── HELPERS ──
function parseDate(str) {
  if (!str) return 99999999;
  var p = str.split('/');
  return p.length === 3 ? +p[2]*10000 + +p[1]*100 + +p[0] : 99999999;
}
function sortByDate(a,b) { return parseDate(a.tgl_daftar) - parseDate(b.tgl_daftar); }

// ── CLASS DIVISION ──
function calculateClasses(siswa) {
  var l = siswa.filter(function(s){ return s.program.endsWith('-L'); }).sort(sortByDate);
  var pr = siswa.filter(function(s){ return s.program.endsWith('-P'); }).sort(sortByDate);
  function get(p,a){ return a.filter(function(s){ return s.program === p; }); }
  return {
    '7A': [].concat(get('ICT-L',l).slice(0,26), get('VCP-L',l).slice(0,3)),
    '7B': [].concat(get('ICT-L',l).slice(26,52), get('VCP-L',l).slice(3,6)),
    '7C': [].concat(get('ICT-L',l).slice(52), get('TCP-L',l), get('VCP-L',l).slice(6)),
    '7D': [].concat(get('ICT-P',pr)),
    '7E': [].concat(get('TCP-P',pr), get('VCP-P',pr))
  };
}

var KELAS_INFO = {'7A':'Putra 1','7B':'Putra 2','7C':'Putra 3','7D':'Putri 1','7E':'Putri 2'};
var KELAS_URUT = ['7A','7B','7C','7D','7E'];

// ── STATE ──
var data = null;
var loading = false;
var loadErr = null;
var tabAktif = '7A';

// ── FETCH DATA ──
async function init() {
  loading = true; loadErr = null; render();
  try {
    var r = await fetch(DATA_URL);
    if (!r.ok) throw new Error('Gagal memuat (HTTP ' + r.status + ')');
    data = await r.json();
    loading = false;
    render();
  } catch(e) {
    loading = false;
    loadErr = e.message;
    render();
  }
}

// ── TAB SWITCH ──
function pilih(k) {
  tabAktif = k;
  var inp = document.getElementById('searchInput');
  if (inp) { inp.value = ''; }
  var btn = document.getElementById('clearBtn');
  if (btn) btn.classList.remove('show');
  renderTable();
  highlightTab();
  var card = document.getElementById('card-container');
  if (card) card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function highlightTab() {
  var tabs = document.querySelectorAll('.tab');
  for (var i = 0; i < tabs.length; i++) {
    tabs[i].classList.toggle('active', tabs[i].dataset.kelas === tabAktif);
  }
}

// ── RENDER ──
function render() {
  var app = document.getElementById('app');
  var ft = document.getElementById('footer');

  if (loading) {
    app.innerHTML = '<div class="loading"><div class="spinner"></div><div class="loading-text">Memuat data...</div></div>';
    ft.innerHTML = '';
    return;
  }
  if (loadErr) {
    app.innerHTML = '<div class="error"><div class="error-icon">⚠️</div><div class="error-text">Gagal memuat data</div><div class="error-detail">' + loadErr + '</div><button class="btn-retry" onclick="init()">🔄 Coba Lagi</button></div>';
    ft.innerHTML = '';
    return;
  }
  if (!data || !data.siswa || !data.siswa.length) {
    app.innerHTML = '<div class="error"><div class="error-text">Data tidak tersedia</div></div>';
    return;
  }

  var html = '<div class="tab-bar" id="tabBar">';
  for (var i = 0; i < KELAS_URUT.length; i++) {
    var k = KELAS_URUT[i];
    html += '<button class="tab' + (tabAktif === k ? ' active' : '') + '" data-kelas="' + k + '" onclick="pilih(\'' + k + '\')">' + k + '</button>';
  }
  html += '</div>';

  html += '<div class="search-wrap">' +
    '<span class="icon">🔍</span>' +
    '<input type="text" id="searchInput" placeholder="Cari nama siswa di semua kelas..." oninput="cariSiswa(this)" autocomplete="off">' +
    '<button class="clear" id="clearBtn" onclick="resetCari()">✕ Hapus</button>' +
    '</div>';

  html += '<div id="card-container"></div>';

  app.innerHTML = html;
  renderTable();

  ft.innerHTML = 'Data: ' + (data.per_tanggal || '-') + ' • <a href="https://pps2627.vercel.app" target="_blank">Kelola Data</a>';
}

// ── SEARCH ──
function cariSiswa(input) {
  var q = input.value.trim();
  var btn = document.getElementById('clearBtn');
  if (btn) btn.classList.toggle('show', q.length > 0);

  var tabBar = document.getElementById('tabBar');
  if (tabBar) tabBar.classList.toggle('mencari', q.length > 0);

  renderTable(q);
}

function resetCari() {
  var inp = document.getElementById('searchInput');
  if (inp) { inp.value = ''; }
  var btn = document.getElementById('clearBtn');
  if (btn) btn.classList.remove('show');

  var tabBar = document.getElementById('tabBar');
  if (tabBar) tabBar.classList.remove('mencari');

  renderTable('');
}

// ── RENDER TABLE ──
function renderTable(query) {
  if (!data || !data.siswa) return;
  if (query === undefined) query = '';

  var kls = calculateClasses(data.siswa);
  var q = query.toLowerCase().trim();

  // ── Search mode: cari di SEMUA kelas ──
  if (q) {
    var semuaHasil = [];
    for (var i = 0; i < KELAS_URUT.length; i++) {
      var k = KELAS_URUT[i];
      var siswaDiKelas = kls[k] || [];
      for (var j = 0; j < siswaDiKelas.length; j++) {
        if (siswaDiKelas[j].nama.toLowerCase().indexOf(q) !== -1) {
          semuaHasil.push({ siswa: siswaDiKelas[j], kelas: k });
        }
      }
    }

    var byKelas = {};
    for (var i = 0; i < semuaHasil.length; i++) {
      var h = semuaHasil[i];
      if (!byKelas[h.kelas]) byKelas[h.kelas] = [];
      byKelas[h.kelas].push(h.siswa);
    }

    var totalHasil = semuaHasil.length;
    var totalSiswa = 0;
    for (var i = 0; i < KELAS_URUT.length; i++) {
      totalSiswa += (kls[KELAS_URUT[i]] || []).length;
    }

    var allRows = '';
    var urutKelas = KELAS_URUT.filter(function(k){ return byKelas[k]; });
    for (var i = 0; i < urutKelas.length; i++) {
      var k = urutKelas[i];
      var list = byKelas[k];

      allRows += '<tr class="grup-header"><td colspan="2">▸ ' + k + ' — ' + KELAS_INFO[k] + ' <span style="color:var(--text3);font-weight:400">(' + list.length + ')</span></td></tr>';

      for (var j = 0; j < list.length; j++) {
        var s = list[j];
        var namaArr = s.nama.split(' ');
        var inisial = (namaArr[0] ? namaArr[0][0] : '') + (namaArr[1] ? namaArr[1][0] : '');
        var warna = j % 3 === 0 ? '#d4a853' : (j % 3 === 1 ? '#7c8cd4' : '#6bb5a0');
        allRows += '<tr><td class="no-col">' + (j + 1) + '</td><td class="nama">' +
          '<span class="avatar" style="background:' + warna + '">' + inisial + '</span>' + s.nama +
          '</td></tr>';
      }
    }

    var card = document.getElementById('card-container');
    if (!card) return;

    card.innerHTML =
      '<div class="kelas-card">' +
        '<div class="kelas-header">' +
          '<div class="kiri">' +
            '<span class="kode semua">🔍</span>' +
            '<span class="info">Hasil pencarian</span>' +
          '</div>' +
          '<span class="count">' + totalHasil + '/' + totalSiswa + ' siswa</span>' +
        '</div>' +
        '<div class="card-body"><table>' +
          '<thead><tr><th style="width:24px">No</th><th>Nama Siswa</th></tr></thead><tbody>' +
          (allRows || '<tr><td colspan="2"><div class="empty">Tidak ada siswa dengan nama "' + query + '"</div></td></tr>') +
          '</tbody></table></div>' +
      '</div>';

    return;
  }

  // ── Normal mode ──
  var siswa = kls[tabAktif] || [];
  var info = KELAS_INFO[tabAktif] || '';

  var rows = '';
  if (siswa.length === 0) {
    rows = '<tr><td colspan="2"><div class="empty">Belum ada siswa</div></td></tr>';
  } else {
    for (var i = 0; i < siswa.length; i++) {
      var s = siswa[i];
      var namaArr = s.nama.split(' ');
      var inisial = (namaArr[0] ? namaArr[0][0] : '') + (namaArr[1] ? namaArr[1][0] : '');
      var warna = i % 3 === 0 ? '#d4a853' : (i % 3 === 1 ? '#7c8cd4' : '#6bb5a0');
      rows += '<tr><td class="no-col">' + (i + 1) + '</td><td class="nama"><span class="avatar" style="background:' + warna + '">' + inisial + '</span>' + s.nama + '</td></tr>';
    }
  }

  var card = document.getElementById('card-container');
  if (!card) return;

  card.innerHTML =
    '<div class="kelas-card">' +
      '<div class="kelas-header">' +
        '<div class="kiri">' +
          '<span class="kode">' + tabAktif + '</span>' +
          '<span class="info">' + info + '</span>' +
        '</div>' +
        '<span class="count">' + siswa.length + ' siswa</span>' +
      '</div>' +
      '<div class="card-body"><table>' +
        '<thead><tr><th style="width:24px">No</th><th>Nama Siswa</th></tr></thead><tbody>' +
        rows +
        '</tbody></table></div>' +
    '</div>';
}

// ── AUTO START: fetch data di background supaya pas masuk udah siap ──
var bgStarted = false;
setTimeout(function(){
  if (!data && !loading && !bgStarted) {
    bgStarted = true;
    loading = true; loadErr = null;
    fetch(DATA_URL).then(function(r){
      if(!r.ok)throw Error('Gagal memuat (HTTP '+r.status+')');
      return r.json();
    }).then(function(d){
      data = d; loading = false;
      var ws = document.getElementById('welcomeScreen');
      if (ws.classList.contains('hidden')) render();
    }).catch(function(e){
      loading = false; loadErr = e.message;
      var ws = document.getElementById('welcomeScreen');
      if (ws.classList.contains('hidden')) render();
    });
  }
}, 100);
</script>
</body>
</html>
