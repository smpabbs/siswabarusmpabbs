<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Siswa Baru 2026/2027 — SMP ABBS Surakarta</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0e17;color:#e2e8f0;min-height:100vh}
.header{background:#0d7377;padding:16px 24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.header h1{font-size:18px;font-weight:700;color:#fff}
.header-sub{font-size:12px;color:#b8f0f0}
.stats-bar{background:#111827;padding:12px 24px;display:flex;gap:20px;flex-wrap:wrap;border-bottom:1px solid #1f2937;font-size:13px}
.stat-item{color:#9ca3af}
.stat-item strong{color:#e2e8f0}
.content{padding:20px 24px;max-width:1200px;margin:0 auto}
.card{background:#1a1f2e;border-radius:10px;border:1px solid #2a3040;overflow:hidden}
.card-header{background:#111827;padding:14px 18px;font-weight:600;font-size:15px;color:#f1f5f9;border-bottom:1px solid #2a3040;display:flex;justify-content:space-between;align-items:center}
.card-body{padding:0;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#111827;color:#9ca3af;font-weight:600;padding:10px 14px;text-align:left;border-bottom:2px solid #2a3040;position:sticky;top:0;white-space:nowrap}
td{padding:8px 14px;border-bottom:1px solid #1f2937;vertical-align:middle;white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:#242a3a}
tr:nth-child(even) td{background:#181e2c}
tr:nth-child(even):hover td{background:#242a3a}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.badge-ICT-L{background:#0d737722;color:#4dd8db;border:1px solid #0d7377}
.badge-ICT-P{background:#8b451322;color:#e8a85d;border:1px solid #8b4513}
.badge-TCP-L{background:#2a5a2a22;color:#6fcf6f;border:1px solid #2a5a2a}
.badge-TCP-P{background:#1a6b8a22;color:#5dc8e8;border:1px solid #1a6b8a}
.badge-VCP-L{background:#6b3a7b22;color:#c084d8;border:1px solid #6b3a7b}
.badge-VCP-P{background:#d4a35d22;color:#d4a35d;border:1px solid #d4a35d}
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.filter-bar input,.filter-bar select{background:#111827;border:1px solid #2a3040;color:#e2e8f0;padding:8px 12px;border-radius:6px;font-size:13px;outline:none}
.filter-bar input:focus,.filter-bar select:focus{border-color:#0d7377}
.filter-bar input{flex:1;min-width:200px}
.count-badge{background:#0d7377;color:#fff;border-radius:10px;padding:2px 10px;font-size:12px;font-weight:600}
.last-update{text-align:center;padding:20px;color:#6b7280;font-size:12px}
.last-update a{color:#0d7377;text-decoration:none}
.last-update a:hover{text-decoration:underline}
.loading{text-align:center;padding:60px 20px;color:#9ca3af}
.loading .spinner{display:inline-block;width:32px;height:32px;border:3px solid #1f2937;border-top-color:#0d7377;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.error{text-align:center;padding:40px 20px;color:#ef4444}
.error .btn-retry{background:#0d7377;color:#fff;border:none;padding:8px 20px;border-radius:6px;cursor:pointer;margin-top:12px;font-size:13px}
.error .btn-retry:hover{background:#0f8a8f}
.program-section{margin-bottom:20px}
@media(max-width:768px){
  .header{flex-direction:column;align-items:flex-start}
  .stats-bar{gap:10px;flex-direction:column}
  td,th{padding:6px 10px;font-size:12px}
  .content{padding:12px}
}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1 id="page-title">Data Siswa Baru 2026/2027</h1>
    <div class="header-sub" id="page-sub">SMP ABBS Surakarta</div>
  </div>
  <div style="font-size:12px;color:#b8f0f0" id="update-info">Memuat data...</div>
</div>

<div class="stats-bar" id="stats-bar"></div>

<div class="content">
  <div class="filter-bar">
    <input type="text" id="search-input" placeholder="🔍 Cari nama atau asal sekolah..." oninput="renderView()">
    <select id="program-filter" onchange="renderView()">
      <option value="">Semua Program</option>
      <option value="ICT-L">ICT Laki-laki</option>
      <option value="ICT-P">ICT Perempuan</option>
      <option value="TCP-L">TCP Laki-laki</option>
      <option value="TCP-P">TCP Perempuan</option>
      <option value="VCP-L">VCP Laki-laki</option>
      <option value="VCP-P">VCP Perempuan</option>
    </select>
    <span class="count-badge" id="result-count">0</span>
  </div>

  <div id="view-container">
    <div class="loading">
      <div class="spinner"></div>
      <div>Memuat data dari server...</div>
    </div>
  </div>

  <div class="last-update" id="footer-info"></div>
</div>

<script>
const RAW_URL = 'https://raw.githubusercontent.com/smpabbs/pps-pembagian-kelas/main/data.json';

const PROGRAM_LABELS = {
  'ICT-L': 'ICT Laki-laki',
  'ICT-P': 'ICT Perempuan',
  'TCP-L': 'TCP Laki-laki',
  'TCP-P': 'TCP Perempuan',
  'VCP-L': 'VCP Laki-laki',
  'VCP-P': 'VCP Perempuan'
};

const PROGRAM_ORDER = ['ICT-L','ICT-P','TCP-L','TCP-P','VCP-L','VCP-P'];

let data = null;
let isLoading = true;
let loadError = null;

async function fetchData() {
  isLoading = true;
  loadError = null;
  renderView();
  try {
    const r = await fetch(RAW_URL);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    data = await r.json();
    isLoading = false;
    renderView();
  } catch(e) {
    isLoading = false;
    loadError = e.message;
    renderView();
  }
}

function escapeHtml(t){return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function renderView() {
  const container = document.getElementById('view-container');
  const statsBar = document.getElementById('stats-bar');
  const updateInfo = document.getElementById('update-info');
  const footer = document.getElementById('footer-info');
  const resultCount = document.getElementById('result-count');

  if (isLoading) {
    container.innerHTML = '<div class="loading"><div class="spinner"></div><div>Memuat data dari server...</div></div>';
    statsBar.innerHTML = '';
    updateInfo.textContent = 'Memuat...';
    footer.innerHTML = '';
    resultCount.textContent = '0';
    return;
  }

  if (loadError) {
    container.innerHTML = '<div class="error"><div style="font-size:40px;margin-bottom:12px">⚠️</div><div style="font-weight:600;margin-bottom:4px">Gagal memuat data</div><div style="font-size:13px;color:#9ca3af">' + escapeHtml(loadError) + '</div><button class="btn-retry" onclick="fetchData()">🔄 Coba lagi</button></div>';
    statsBar.innerHTML = '';
    updateInfo.textContent = 'Gagal';
    footer.innerHTML = '';
    resultCount.textContent = '0';
    return;
  }

  if (!data || !data.siswa) {
    container.innerHTML = '<div class="error">Data tidak tersedia</div>';
    return;
  }

  // Update header
  document.getElementById('page-title').textContent = data.title || 'Data Siswa Baru 2026/2027';
  document.getElementById('page-sub').textContent = data.sekolah || 'SMP ABBS Surakarta';
  updateInfo.textContent = 'Data per ' + (data.per_tanggal || '-');

  // Stats bar
  statsBar.innerHTML = '<span class="stat-item">Total: <strong>' + data.total + '</strong> siswa</span>' +
    '<span class="stat-item">Laki-laki: <strong>' + data.l_count + '</strong></span>' +
    '<span class="stat-item">Perempuan: <strong>' + data.p_count + '</strong></span>';

  // Filter
  const search = document.getElementById('search-input').value.toLowerCase().trim();
  const progFilter = document.getElementById('program-filter').value;

  let filtered = data.siswa.filter(s => {
    if (progFilter && s.program !== progFilter) return false;
    if (search) {
      const n = s.nama.toLowerCase();
      const a = s.asal_sekolah.toLowerCase();
      const c = (s.catatan || '').toLowerCase();
      if (!n.includes(search) && !a.includes(search) && !c.includes(search)) return false;
    }
    return true;
  });

  // Group by program
  const groups = {};
  for (const s of filtered) {
    const p = s.program || 'Lainnya';
    if (!groups[p]) groups[p] = [];
    groups[p].push(s);
  }

  resultCount.textContent = filtered.length;

  // Build HTML
  let html = '';
  let progKeys = Object.keys(groups).sort((a,b) => PROGRAM_ORDER.indexOf(a) - PROGRAM_ORDER.indexOf(b));

  if (progKeys.length === 0) {
    html = '<div class="card" style="padding:40px;text-align:center;color:#9ca3af">Tidak ada siswa yang cocok dengan pencarian</div>';
  } else {
    for (const prog of progKeys) {
      const list = groups[prog];
      const label = PROGRAM_LABELS[prog] || prog;
      // Generate tabel
      let rows = '';
      for (const s of list) {
        const catatan = s.catatan ? '<span style="color:#e8a85d;font-size:11px">' + escapeHtml(s.catatan) + '</span>' : '';
        rows += '<tr>' +
          '<td>' + s.id + '</td>' +
          '<td><strong>' + escapeHtml(s.nama) + '</strong></td>' +
          '<td><span class="badge badge-' + escapeHtml(prog) + '">' + escapeHtml(prog) + '</span></td>' +
          '<td>' + escapeHtml(s.asal_sekolah) + '</td>' +
          '<td>' + escapeHtml(s.tgl_daftar) + '</td>' +
          '<td>' + catatan + '</td>' +
        '</tr>';
      }
      html += '<div class="program-section">' +
        '<div class="card">' +
        '<div class="card-header">' +
        '<span>' + escapeHtml(label) + '</span>' +
        '<span class="count-badge">' + list.length + ' siswa</span>' +
        '</div>' +
        '<div class="card-body">' +
        '<table>' +
        '<thead><tr>' +
        '<th>No</th><th>Nama</th><th>Program</th><th>Asal Sekolah</th><th>Tgl Daftar</th><th>Catatan</th>' +
        '</tr></thead>' +
        '<tbody>' + rows + '</tbody>' +
        '</table>' +
        '</div></div></div>';
    }
  }

  container.innerHTML = html;

  // Footer
  footer.innerHTML = 'Data bersumber dari ' +
    '<a href="https://github.com/smpabbs/pps-pembagian-kelas" target="_blank">github.com/smpabbs/pps-pembagian-kelas</a> • ' +
    '<a href="https://pps2627.vercel.app" target="_blank">Halaman Admin PPS</a>' +
    '<br>Total <strong>' + data.total + '</strong> siswa — <span id="footer-date">' + (data.per_tanggal || '-') + '</span>';
}

// Initial load
fetchData();
</script>
</body>
</html>
