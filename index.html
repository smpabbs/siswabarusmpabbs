<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pembagian Kelas Siswa Baru SMP ABBS 2026/2027</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f1f5f9;color:#0f172a;min-height:100vh}
.header{background:linear-gradient(135deg,#0d7377,#0f8a8f);padding:28px 20px 36px;text-align:center}
.header h1{font-size:17px;font-weight:700;color:#fff;letter-spacing:.3px;line-height:1.4}
.header .sub{font-size:12px;color:#b8f0f0;margin-top:3px;opacity:.9}
.content{max-width:800px;margin:-16px auto 0;padding:0 12px 20px}
.tab-bar{background:#fff;border-radius:12px;padding:6px;display:flex;gap:4px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:14px}
.tab{flex:1;text-align:center;padding:10px 0;border-radius:9px;font-size:13px;font-weight:600;color:#64748b;cursor:pointer;transition:all .2s;border:none;background:none;font-family:inherit}
.tab:hover{color:#0d7377;background:#f0fdfa}
.tab.active{background:#0d7377;color:#fff;box-shadow:0 1px 4px rgba(13,115,119,.3)}
.kelas-card{background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.06);overflow:hidden}
.kelas-header{display:flex;justify-content:space-between;align-items:center;padding:16px 18px}
.kelas-header .kiri{display:flex;align-items:center;gap:10px}
.kelas-header .kode{font-weight:700;font-size:14px;color:#0d7377;background:#f0fdfa;padding:3px 14px;border-radius:14px}
.kelas-header .info{font-size:13px;color:#64748b}
.card-body{padding:0 0 2px}
table{width:100%;border-collapse:collapse;font-size:14px}
th{font-size:11px;color:#94a3b8;font-weight:600;padding:8px 18px;text-align:left;border-bottom:1px solid #f1f5f9;letter-spacing:.5px;text-transform:uppercase}
td{padding:10px 18px;border-bottom:1px solid #f8fafc;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:nth-child(even) td{background:#fafbfc}
.no-col{color:#cbd5e1;width:28px;text-align:center;font-size:12px;font-weight:500}
.nama{font-weight:500;color:#0f172a}
.loading{text-align:center;padding:80px 20px}
.spinner{display:inline-block;width:28px;height:28px;border:3px solid #e2e8f0;border-top-color:#0d7377;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{color:#94a3b8;font-size:13px;margin-top:10px}
.error{text-align:center;padding:60px 20px}
.error-icon{font-size:36px;margin-bottom:8px}
.error-text{color:#ef4444;font-weight:600;font-size:14px;margin-bottom:4px}
.error-detail{color:#94a3b8;font-size:13px;margin-bottom:14px}
.btn-retry{background:#0d7377;color:#fff;border:none;padding:8px 22px;border-radius:8px;cursor:pointer;font-size:13px;font-family:inherit}
.btn-retry:hover{background:#0f8a8f}
.footer{text-align:center;padding:18px;color:#94a3b8;font-size:11px}
.footer a{color:#0d7377;text-decoration:none}
.footer a:hover{text-decoration:underline}
@media(max-width:480px){
  .header h1{font-size:15px}
  .tab{font-size:12px;padding:8px 0}
  td,th{padding:8px 14px;font-size:13px}
  .kelas-header{padding:12px 14px}
  .kelas-header .info{font-size:12px}
}
</style>
</head>
<body>

<div class="header">
  <h1>PEMBAGIAN KELAS SISWA BARU</h1>
  <div class="sub">SMP ABBS SURAKARTA — TAHUN AJARAN 2026/2027</div>
</div>

<div class="content" id="app">
  <div class="loading">
    <div class="spinner"></div>
    <div class="loading-text">Memuat data...</div>
  </div>
</div>

<div class="footer" id="footer"></div>

<script>
const RAW = 'https://raw.githubusercontent.com/smpabbs/pps-pembagian-kelas/main/data.json';

function p(s){return s.split('/').reduce((a,c,i)=>a+(+c)*(i==0?1:i==1?100:10000),0)}
function ds(a,b){return p(a.tgl_daftar)-p(b.tgl_daftar)}

function kelas(siswa){
  const L=s=>s.program.endsWith('-L'),P=s=>s.program.endsWith('-P');
  const l=siswa.filter(L).sort(ds),pr=siswa.filter(P).sort(ds);
  const g=(p,a)=>a.filter(s=>s.program===p);
  return {
    '7A':[...g('ICT-L',l).slice(0,26),...g('VCP-L',l).slice(0,3)],
    '7B':[...g('ICT-L',l).slice(26,52),...g('VCP-L',l).slice(3,6)],
    '7C':[...g('ICT-L',l).slice(52),...g('TCP-L',l),...g('VCP-L',l).slice(6)],
    '7D':[...g('ICT-P',pr)],
    '7E':[...g('TCP-P',pr),...g('VCP-P',pr)]
  };
}

const INFO={'7A':'Putra 1','7B':'Putra 2','7C':'Putra 3','7D':'Putri 1','7E':'Putri 2'};
const O=['7A','7B','7C','7D','7E'];

let data,loading=true,err=null;

async function init(){
  loading=true;err=null;render();
  try{
    const r=await fetch(RAW);
    if(!r.ok)throw Error('Gagal memuat (HTTP '+r.status+')');
    data=await r.json();loading=false;render();
  }catch(e){loading=false;err=e.message;render()}
}

let tab=O[0];
function pilih(k){tab=k;render()}

function render(){
  const app=document.getElementById('app'),ft=document.getElementById('footer');
  if(loading){app.innerHTML='<div class="loading"><div class="spinner"></div><div class="loading-text">Memuat data...</div></div>';ft.innerHTML='';return}
  if(err){app.innerHTML='<div class="error"><div class="error-icon">⚠️</div><div class="error-text">Gagal memuat data</div><div class="error-detail">'+err+'</div><button class="btn-retry" onclick="init()">🔄 Coba Lagi</button></div>';ft.innerHTML='';return}
  if(!data||!data.siswa||!data.siswa.length){app.innerHTML='<div class="error"><div class="error-text">Data tidak tersedia</div></div>';return}

  const kls=kelas(data.siswa);

  // Tabs
  let tabs='<div class="tab-bar">';
  for(const k of O)tabs+='<button class="tab'+(tab===k?' active':'')+'" onclick="pilih(\''+k+'\')">'+k+'</button>';
  tabs+='</div>';

  // Active class body
  const siswa=kls[tab]||[];
  let rows='';
  siswa.forEach((s,i)=>{
    rows+='<tr><td class="no-col">'+(i+1)+'</td><td class="nama">'+s.nama+'</td></tr>';
  });

  app.innerHTML=tabs+
    '<div class="kelas-card">'+
      '<div class="kelas-header">'+
        '<div class="kiri">'+
          '<span class="kode">'+tab+'</span>'+
          '<span class="info">'+INFO[tab]+' — '+siswa.length+' siswa</span>'+
        '</div>'+
      '</div>'+
      '<div class="card-body"><table>'+
        '<thead><tr><th style="width:28px">No</th><th>Nama Siswa</th></tr></thead><tbody>'+
        rows+
        '</tbody></table></div>'+
    '</div>';

  ft.innerHTML='Data: '+(data.per_tanggal||'-')+' • <a href="https://pps2627.vercel.app" target="_blank">Admin</a>';
}

init();
</script>
</body>
</html>
