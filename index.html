<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pembagian Kelas Siswa Baru SMP ABBS 2026/2027</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0c1222;--bg2:#111827;--bg3:#1a2235;--bg4:#1e293b;--border:#2a3346;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--gold:#d4a853;--gold2:#c4953a;--teal:#2dd4bf}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Inter,sans-serif;
  background:radial-gradient(ellipse at top,#0f1a2e,#080e1a);color:var(--text);min-height:100vh
}
.welcome{
  position:fixed;inset:0;z-index:9999;background:radial-gradient(ellipse at center,#0f1a2e 0%,#080e1a 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;
  transition:opacity .6s,visibility .6s
}
.welcome.hidden{opacity:0;visibility:hidden;pointer-events:none}
.welcome .star{position:absolute;border-radius:50%;background:#fff;opacity:0;animation:twinkle var(--d,3s) ease-in-out infinite var(--delay,0s)}
@keyframes twinkle{0%,100%{opacity:0;transform:scale(.5)}50%{opacity:.6;transform:scale(1)}}
.welcome .logo{width:64px;height:64px;border-radius:50%;object-fit:cover;margin-bottom:18px;position:relative;z-index:1;border:2px solid rgba(212,168,83,.25)}
.welcome .ayat{font-size:20px;font-weight:600;color:var(--gold);line-height:1.6;max-width:460px;position:relative;z-index:1;font-family:'Times New Roman',serif}
.welcome .arti{font-size:13px;color:var(--text2);margin-top:12px;max-width:400px;position:relative;z-index:1}
.welcome .sumber{font-size:11px;color:var(--text3);margin-top:6px;position:relative;z-index:1;font-style:italic}
.welcome .btn{
  margin-top:28px;padding:12px 40px;border-radius:10px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#0c1222;font-weight:700;font-size:14px;border:none;cursor:pointer;
  transition:all .3s;position:relative;z-index:1;font-family:inherit;
  box-shadow:0 4px 20px rgba(212,168,83,.2)
}
.welcome .btn:hover{transform:translateY(-2px)}
.header{text-align:center;padding:28px 20px 12px}
.header .logo{width:44px;height:44px;border-radius:50%;object-fit:cover;border:2px solid rgba(212,168,83,.2);margin-bottom:8px}
.header h1{font-size:17px;font-weight:800;color:var(--text)}
.header .sub{font-size:11px;color:var(--text2);margin-top:3px}
.main-search{max-width:580px;margin:0 auto;padding:16px 16px 0;text-align:center}
.main-search .sapa{font-size:16px;color:var(--text2);margin-bottom:4px;line-height:1.7}
.main-search .sapa strong{color:var(--gold)}
.main-search .sapa2{font-size:13px;color:var(--text3);margin-bottom:24px}
.search-box{position:relative;max-width:480px;margin:0 auto}
.search-box input{
  width:100%;padding:14px 16px 14px 48px;border-radius:14px;
  border:1px solid var(--border);background:var(--bg3);color:var(--text);
  font-size:15px;font-family:inherit;outline:none;transition:all .2s
}
.search-box input:focus{border-color:var(--gold);box-shadow:0 0 20px rgba(212,168,83,.1)}
.search-box input::placeholder{color:var(--text3)}
.search-box .icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:18px;color:var(--text3)}
.suggestions{
  position:absolute;top:calc(100% + 4px);left:0;right:0;
  background:var(--bg3);border:1px solid var(--border);border-radius:12px;
  max-height:280px;overflow-y:auto;display:none;z-index:100;
  box-shadow:0 8px 30px rgba(0,0,0,.4)
}
.suggestions.show{display:block}
.suggestions .item{padding:12px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);transition:background .15s;text-align:left}
.suggestions .item:last-child{border-bottom:none}
.suggestions .item:hover{background:var(--bg4)}
.suggestions .item .avatar{
  width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;color:#fff;flex-shrink:0
}
.suggestions .item .info{flex:1}
.suggestions .item .info .nama{font-weight:600;font-size:14px}
.suggestions .item .info .detail{font-size:12px;color:var(--text3);margin-top:2px}
.suggestions .item .badge-s{font-size:11px;color:var(--gold);font-weight:600;background:rgba(212,168,83,.1);padding:2px 10px;border-radius:10px}
.result{display:none;margin-top:32px;animation:fadeUp .4s ease}
.result.show{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* Student Card */
.student-card{background:var(--bg3);border:1px solid var(--border);border-radius:16px;margin:0 auto;box-shadow:0 4px 24px rgba(0,0,0,.25);overflow:hidden;max-width:560px}
.student-card .card-top{background:linear-gradient(135deg,rgba(212,168,83,.06),rgba(45,212,191,.04));padding:24px 24px 20px;border-bottom:1px solid var(--border)}
.student-card .row{display:flex;gap:16px;align-items:center}
.student-card .avatar-lg{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;color:#fff;flex-shrink:0;box-shadow:0 4px 12px rgba(0,0,0,.3)}
.student-card .info{flex:1}
.student-card .info .nama-lg{font-size:20px;font-weight:700;color:var(--text)}
.student-card .info .kelas-lg{font-size:15px;color:var(--gold);font-weight:600;margin-top:4px}
.student-card .card-body{padding:20px 24px}
.student-card .walas-info{font-size:14px;color:var(--text2);line-height:1.7}
.student-card .walas-info strong{color:var(--teal);font-weight:600}
.student-card .walas-info .cp{color:var(--text3);font-size:13px;display:block;margin-top:2px}
.student-card .divider{border:none;border-top:1px solid var(--border);margin:16px 0}
.student-card .wa-label{font-size:12px;font-weight:600;color:var(--text3);margin-bottom:10px;letter-spacing:.3px}
.student-card .wa-actions{display:flex;gap:10px;flex-wrap:wrap}
.student-card .wa-actions a{
  display:inline-flex;align-items:center;gap:8px;flex:1;min-width:180px;
  padding:12px 18px;border-radius:10px;font-size:13px;font-weight:700;text-decoration:none;
  transition:all .2s;font-family:inherit;justify-content:center
}
.student-card .wa-actions a.grup{background:rgba(45,212,191,.1);color:var(--teal);border:1px solid rgba(45,212,191,.2)}
.student-card .wa-actions a.grup:hover{background:rgba(45,212,191,.18);border-color:rgba(45,212,191,.35)}
.student-card .wa-actions a.angkatan{background:rgba(212,168,83,.1);color:var(--gold);border:1px solid rgba(212,168,83,.2)}
.student-card .wa-actions a.angkatan:hover{background:rgba(212,168,83,.18);border-color:rgba(212,168,83,.35)}
.wa-info-box{margin-top:12px;padding:14px 16px;border-radius:10px;background:rgba(255,255,255,.03);border:1px solid var(--border);font-size:12px;color:var(--text3);line-height:1.8}
.wa-info-box strong{color:var(--text2)}
.wa-info-box .wajib{color:var(--teal);font-weight:600}
.wa-info-box .dilarang{color:#ef4444;font-weight:600}
.wa-info-box ul{list-style:none;padding:0;margin:0}
.wa-info-box ul li{padding:2px 0 2px 20px;position:relative}
.wa-info-box ul li::before{content:'';position:absolute;left:4px;top:10px;width:6px;height:6px;border-radius:50%;background:var(--text3)}

/* Class Table */
.class-section{margin-top:28px;max-width:700px;margin-left:auto;margin-right:auto}
.class-section .class-title{font-size:14px;font-weight:700;color:var(--gold);margin-bottom:12px;text-align:center}
.table-wrap{background:var(--bg3);border:1px solid var(--border);border-radius:12px;overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:9px 14px;text-align:left;font-size:10px;color:var(--text3);font-weight:600;letter-spacing:.5px;text-transform:uppercase;border-bottom:1px solid var(--border);background:var(--bg2)}
td{padding:8px 14px;border-bottom:1px solid rgba(42,51,70,.4);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(212,168,83,.04)}
tr:nth-child(even) td{background:rgba(255,255,255,.015)}
.no{color:var(--text3);width:28px;text-align:center;font-size:12px}
.nama-cell{font-weight:500}
.nama-cell .avatar-sm{display:inline-flex;width:22px;height:22px;border-radius:50%;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;margin-right:8px;flex-shrink:0}
.jk{width:40px;text-align:center;font-size:12px}.jk.l{color:var(--teal)}.jk.p{color:var(--gold)}
.asal{color:var(--text2);font-size:12px}
.highlight td{background:rgba(212,168,83,.08)!important}
.highlight td.nama-cell{color:var(--gold);font-weight:700}

.btn-secondary{display:inline-block;padding:10px 28px;border-radius:10px;background:var(--bg4);color:var(--text2);border:1px solid var(--border);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit;text-decoration:none}
.btn-secondary:hover{background:var(--border);color:var(--text)}
.footer-nav{text-align:center;margin-bottom:20px}

.loading{text-align:center;padding:60px 20px}
.spinner{display:inline-block;width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{color:var(--text3);font-size:13px;margin-top:10px}
#app-loading{display:block}

@media(max-width:480px){
  .student-card .card-top{padding:16px}.student-card .card-body{padding:16px}
  .student-card .avatar-lg{width:48px;height:48px;font-size:20px}
  .student-card .info .nama-lg{font-size:17px}
  .student-card .wa-actions a{min-width:auto;padding:10px 14px;font-size:12px}
  .wa-info-box{font-size:11px;padding:12px}
  .main-search .sapa{font-size:14px}
  td,th{padding:6px 10px;font-size:12px}
}
</style>
</head>
<body>

<div class="welcome" id="welcome">
  <div class="star" style="width:2px;height:2px;top:12%;left:15%;--d:3.2s;--delay:.5s"></div>
  <div class="star" style="width:1.5px;height:1.5px;top:8%;right:22%;--d:2.8s;--delay:1.2s"></div>
  <div class="star" style="width:2px;height:2px;top:25%;left:72%;--d:4s;--delay:.2s"></div>
  <div class="star" style="width:1px;height:1px;top:60%;left:10%;--d:3.5s;--delay:2s"></div>
  <div class="star" style="width:2px;height:2px;bottom:30%;right:15%;--d:2.5s;--delay:1s"></div>
  <div class="star" style="width:1.5px;height:1.5px;bottom:20%;left:25%;--d:3.8s;--delay:.8s"></div>
  <img class="logo" src="https://i.ibb.co.com/yFn890yV/logo-smpabbs.png" alt="logo smpabbs">
  <div class="ayat">خَيْرُ النَّاسِ أَنْفَعُهُمْ لِلنَّاسِ</div>
  <div class="arti">"Sebaik-baik manusia adalah yang paling bermanfaat bagi manusia lainnya."</div>
  <div class="sumber">— HR. Ahmad, Ath-Thabrani, Al-Mu'jam Al-Ausath</div>
  <button class="btn" id="btnMasuk">بِسْمِ اللَّهِ — MASUK</button>
</div>

<div class="header">
  <img class="logo" src="https://i.ibb.co.com/yFn890yV/logo-smpabbs.png" alt="logo smpabbs">
  <h1>PEMBAGIAN KELAS SISWA BARU</h1>
  <div class="sub">SMP ABBS SURAKARTA — TAHUN AJARAN 2026/2027</div>
</div>

<div id="appContainer">
  <div class="loading" id="app-loading">
    <div class="spinner"></div>
    <div class="loading-text">Memuat data...</div>
  </div>
</div>

<script>
(function(){
  var DATA_URL = 'https://cdn.jsdelivr.net/gh/smpabbs/pps-pembagian-kelas@main/data.json';
  var WALAS = {
    '7A':{nama:'Mr Hang',cp:'+62 895-2903-2377',panggilan:'Mr Hang',warna:'#0d7377',wa_grup:'https://chat.whatsapp.com/GILUNPKKbsj7zuc5mXV2uc?s=cl&p=a&ilr=1&amv=2'},
    '7B':{nama:'Mr Joko',cp:'+62 858-4222-0006',panggilan:'Mr Joko',warna:'#1a6b8a',wa_grup:'https://chat.whatsapp.com/LdLclfvwc2c044gHVjSz76?s=sh&p=a&ilr=4&amv=0'},
    '7C':{nama:'Mr Sharih',cp:'+62 857-2500-7383',panggilan:'Mr Sharih',warna:'#2a5a2a',wa_grup:'https://chat.whatsapp.com/CnrhoOmf4qaCLjkdzkeYI3?s=cl&p=a&ilr=0'},
    '7D':{nama:'Ms Binti',cp:'+62 857-2732-0047',panggilan:'Ms Binti',warna:'#b45309',wa_grup:'https://chat.whatsapp.com/Dxs0jto6kYF7kRE8GyeJDI?s=cl&p=a&ilr=0&amv=2'},
    '7E':{nama:'Ms Putri',cp:'+62 856-4664-2303',panggilan:'Ms Putri',warna:'#7c3aed',wa_grup:'https://chat.whatsapp.com/HNoc5OH6cJWBEKNK0uzKzn?mode=gi_t'}
  };
  var WA_ANGKATAN = 'https://chat.whatsapp.com/DbypFi9BvAc43gl4aA8OFP?s=cl&p=a&ilr=0';
  var KELAS_INFO = {'7A':'Putra 1','7B':'Putra 2','7C':'Putra 3','7D':'Putri 1','7E':'Putri 2'};
  var KELAS_URUT = ['7A','7B','7C','7D','7E'];

  var data = null;
  var appEl = document.getElementById('appContainer');
  var welcomeEl = document.getElementById('welcome');

  function p(s){return s.split('/').reduce(function(a,c,i){return a+(+c)*(i==0?1:i==1?100:10000)},0)}
  function ds(a,b){return p(a.tgl_daftar)-p(b.tgl_daftar)}

  function hitungKelas(siswa){
    var l=siswa.filter(function(s){return s.program.endsWith('-L')}).sort(ds);
    var pr=siswa.filter(function(s){return s.program.endsWith('-P')}).sort(ds);
    function g(p,a){return a.filter(function(s){return s.program===p})}
    return {
      '7A':[].concat(g('ICT-L',l).slice(0,26),g('VCP-L',l).slice(0,3)),
      '7B':[].concat(g('ICT-L',l).slice(26,52),g('VCP-L',l).slice(3,6)),
      '7C':[].concat(g('ICT-L',l).slice(52),g('TCP-L',l),g('VCP-L',l).slice(6)),
      '7D':[].concat(g('ICT-P',pr)),
      '7E':[].concat(g('TCP-P',pr),g('VCP-P',pr))
    };
  }

  function getKelasSiswa(s, kls){
    for(var k in kls) for(var i=0;i<kls[k].length;i++) if(kls[k][i].id===s.id) return k;
    return null;
  }

  function rowSiswa(s,i,highlight){
    var arr=s.nama.split(' '),in2=(arr[0]?arr[0][0]:'')+(arr[1]?arr[1][0]:'');
    var w2=i%3===0?'#d4a853':(i%3===1?'#7c8cd4':'#6bb5a0');
    var jk=s.program.endsWith('-L')?'L':'P';
    return '<tr'+(highlight?' class="highlight"':'')+'>'+
      '<td class="no">'+(i+1)+'</td>'+
      '<td class="nama-cell"><span class="avatar-sm" style="background:'+w2+'">'+in2+'</span>'+s.nama+'</td>'+
      '<td class="jk '+jk.toLowerCase()+'">'+(jk==='L'?'♂':'♀')+'</td>'+
      '<td class="asal">'+s.asal_sekolah+'</td></tr>';
  }

  function tampilkanHasil(s){
    var kls=hitungKelas(data.siswa);
    var kelasSiswa=getKelasSiswa(s,kls);
    if(!kelasSiswa) return;
    var w=WALAS[kelasSiswa]||{};
    var info=KELAS_INFO[kelasSiswa]||'';
    var arr=s.nama.split(' '),inial=(arr[0]?arr[0][0]:'')+(arr[1]?arr[1][0]:'');
    var list=kls[kelasSiswa]||[];
    var lCount=list.filter(function(x){return x.program.endsWith('-L')}).length;
    var pCount=list.filter(function(x){return x.program.endsWith('-P')}).length;
    var rows='';
    for(var i=0;i<list.length;i++) rows+=rowSiswa(list[i],i,list[i].id===s.id);
    var html=
      '<div class="footer-nav"><button class="btn-secondary" id="btnCariLagi">← Cari Nama Lain</button></div>'+
      '<div class="student-card">'+
        '<div class="card-top"><div class="row">'+
          '<span class="avatar-lg" style="background:'+(w.warna||'#64748b')+'">'+inial+'</span>'+
          '<div class="info">'+
            '<div class="nama-lg">'+s.nama+'</div>'+
            '<div class="kelas-lg">'+kelasSiswa+' — '+info+'</div>'+
          '</div>'+
        '</div></div>'+
        '<div class="card-body">'+
          '<div class="walas-info">Wali Kelas: <strong>'+(w.nama||'-')+'</strong></div>'+
          (w.cp?'<a href="https://wa.me/'+w.cp.replace(/[^0-9]/g,'')+'" target="_blank" class="btn-secondary" style="margin-top:8px;display:inline-flex;align-items:center;gap:6px;padding:8px 16px;font-size:12px">📞 Chat Wali Kelas</a>':'')+
          '<hr class="divider">'+
          '<div class="wa-label">💬 GRUP WHATSAPP</div>'+
          '<div class="wa-actions">'+
            (w.wa_grup?'<a href="'+w.wa_grup+'" target="_blank" class="grup">💬 Grup Kelas '+kelasSiswa+'</a>':'')+
            '<a href="'+WA_ANGKATAN+'" target="_blank" class="angkatan">👥 Grup Angkatan Level 7</a>'+
          '</div>'+
          '<div class="wa-info-box">'+
            '<ul>'+
              '<li><strong>Grup Kelas</strong> dan <strong>Grup Angkatan</strong> adalah grup <span class="wajib">WAJIB</span> bagi orang tua/wali</li>'+
              '<li>Semua orang tua/wali wajib bergabung di <strong>kedua grup</strong></li>'+
              '<li>Yang bergabung boleh <strong>Ayah</strong>/ <strong>Ibu</strong>, atau <strong>keduanya</strong></li>'+
              '<li><span class="dilarang">Siswa dilarang join grup ini</span> — grup khusus siswa akan diinformasikan wali kelas</li>'+
            '</ul>'+
          '</div>'+
        '</div>'+
      '</div>'+
      '<div class="class-section">'+
        '<div class="class-title">👥 '+kelasSiswa+' — '+info+' ('+list.length+' siswa · ♂'+lCount+' ♀'+pCount+')</div>'+
        '<div class="table-wrap"><table>'+
          '<thead><tr><th style="width:28px">No</th><th>Nama Siswa</th><th style="width:40px">JK</th><th>Asal Sekolah</th></tr></thead><tbody>'+
          rows+'</tbody></table></div></div>';
    appEl.innerHTML=html;
    document.getElementById('btnCariLagi').onclick=function(){resetView();};
    appEl.scrollIntoView({behavior:'smooth',block:'start'});
  }

  function resetView(){
    appEl.innerHTML=tampilkanSearch();
    document.getElementById('searchInput').focus();
    pasangListenerSearch();
  }

  function tampilkanSearch(){
    return ''+
      '<div class="main-search">'+
        '<div class="sapa">Assalamu\'alaikum wr wb 👋<br>Selamat datang, calon siswa baru!<br><strong>Cari namamu</strong> untuk mengetahui kelas dan informasi lengkap.</div>'+
        '<div class="sapa2">Ketik nama lengkap atau sebagian namamu</div>'+
        '<div class="search-box">'+
          '<span class="icon">🔍</span>'+
          '<input type="text" id="searchInput" placeholder="Cari namamu..." autocomplete="off">'+
          '<div class="suggestions" id="suggestions"></div>'+
        '</div>'+
      '</div>'+
      '<div class="result" id="result"></div>';
  }

  function pasangListenerSearch(){
    var inp=document.getElementById('searchInput');
    if(!inp) return;
    inp.addEventListener('input',function(){
      var q=this.value.trim().toLowerCase();
      var el=document.getElementById('suggestions');
      if(!el) return;
      if(!q||!data){el.classList.remove('show');return;}
      var hasil=[];
      for(var i=0;i<data.siswa.length;i++){
        if(data.siswa[i].nama.toLowerCase().indexOf(q)!==-1){
          hasil.push(data.siswa[i]);
          if(hasil.length>=8) break;
        }
      }
      if(hasil.length===0){el.classList.remove('show');return;}
      var h='';
      for(var i=0;i<hasil.length;i++){
        var s=hasil[i];
        var arr=s.nama.split(' '),inial=(arr[0]?arr[0][0]:'')+(arr[1]?arr[1][0]:'');
        var warna=i%3===0?'#d4a853':(i%3===1?'#7c8cd4':'#6bb5a0');
        var sk=getKelasSiswa(s,hitungKelas(data.siswa))||'';
        h+='<div class="item" data-id="'+s.id+'">'+
          '<span class="avatar" style="background:'+warna+'">'+inial+'</span>'+
          '<div class="info"><div class="nama">'+s.nama+'</div><div class="detail">'+s.asal_sekolah+'</div></div>'+
          (sk?'<span class="badge-s">'+sk+'</span>':'')+
          '</div>';
      }
      el.innerHTML=h;
      el.classList.add('show');
      // Click handlers for each item
      var items=el.querySelectorAll('.item');
      for(var i=0;i<items.length;i++){
        items[i].onclick=function(){
          var id=parseInt(this.getAttribute('data-id'));
          el.classList.remove('show');
          inp.blur();
          var s=null;
          for(var j=0;j<data.siswa.length;j++) if(data.siswa[j].id===id){s=data.siswa[j];break;}
          if(s) tampilkanHasil(s);
        };
      }
    });
    // Close suggestions on outside click
    document.addEventListener('click',function(e){
      var s=document.getElementById('suggestions');
      if(s&&!e.target.closest('.search-box')) s.classList.remove('show');
    });
  }

  function initApp(){
    var loadingEl=document.getElementById('app-loading');
    if(loadingEl) loadingEl.style.display='block';
    var r=new XMLHttpRequest();
    r.open('GET',DATA_URL,true);
    r.onload=function(){
      if(r.status>=200&&r.status<400){
        try{data=JSON.parse(r.responseText);}catch(e){data=null;}
        if(data&&data.siswa){
          appEl.innerHTML=tampilkanSearch();
          pasangListenerSearch();
        }else{
          appEl.innerHTML='<div class="loading">Data tidak tersedia</div>';
        }
      }else{
        appEl.innerHTML='<div class="loading">⚠️ Gagal memuat data. <button onclick="initApp()" style="background:var(--gold);border:none;padding:8px 20px;border-radius:8px;color:#0c1222;font-weight:600;cursor:pointer">Coba Lagi</button></div>';
      }
    };
    r.onerror=function(){
      appEl.innerHTML='<div class="loading">⚠️ Gagal memuat data. <button onclick="initApp()" style="background:var(--gold);border:none;padding:8px 20px;border-radius:8px;color:#0c1222;font-weight:600;cursor:pointer">Coba Lagi</button></div>';
    };
    r.send();
  }

  // Button handler
  document.getElementById('btnMasuk').onclick=function(){
    welcomeEl.classList.add('hidden');
    appEl.innerHTML='<div class="loading"><div class="spinner"></div><div class="loading-text">Memuat data...</div></div>';
    initApp();
  };
})();
</script>
</body>
</html>
