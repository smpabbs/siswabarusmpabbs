<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pembagian Kelas Siswa Baru SMP ABBS Surakarta TA 2026/2027</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f8f9fa;color:#1e293b;min-height:100vh}
.header{background:#0d7377;padding:20px 24px;text-align:center}
.header h1{font-size:20px;font-weight:700;color:#fff;margin-bottom:4px}
.header .sub{font-size:13px;color:#b8f0f0}
.stats-bar{background:#fff;padding:12px 24px;display:flex;gap:24px;flex-wrap:wrap;justify-content:center;border-bottom:1px solid #e2e8f0;font-size:13px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.stat-item{color:#64748b}
.stat-item strong{color:#0d7377}
.content{max-width:900px;margin:0 auto;padding:20px 16px}
.kelas-card{background:#fff;border-radius:10px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.08);overflow:hidden}
.kelas-header{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;cursor:pointer;user-select:none;transition:background .2s}
.kelas-header:hover{background:#f1f5f9}
.kelas-header .kiri{display:flex;align-items:center;gap:12px}
.kelas-header .kode{font-weight:700;font-size:16px;color:#fff;padding:4px 14px;border-radius:20px}
.kelas-header .info{font-size:13px;color:#64748b}
.kelas-header .arrow{font-size:12px;color:#94a3b8;transition:transform .3s}
.kelas-card.open .kelas-header .arrow{transform:rotate(180deg)}
.kelas-body{display:none;padding:0;border-top:1px solid #e2e8f0}
.kelas-card.open .kelas-body{display:block}
table{width:100%;border-collapse:collapse;font-size:14px}
th{background:#f8fafc;color:#64748b;font-weight:600;padding:10px 18px;text-align:left;border-bottom:1px solid #e2e8f0;font-size:12px;text-transform:uppercase;letter-spacing:.5px}
td{padding:10px 18px;border-bottom:1px solid #f1f5f9;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:nth-child(even) td{background:#f8fafc}
.number-col{color:#94a3b8;width:40px;text-align:center;font-size:13px}
.loading,.error{text-align:center;padding:60px 20px}
.loading .spinner{display:inline-block;width:36px;height:36px;border:3px solid #e2e8f0;border-top-color:#0d7377;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{color:#64748b;font-size:14px}
.error-icon{font-size:40px;margin-bottom:8px}
.error-text{color:#ef4444;font-weight:600;margin-bottom:4px}
.error-detail{color:#94a3b8;font-size:13px;margin-bottom:16px}
.btn-retry{background:#0d7377;color:#fff;border:none;padding:8px 20px;border-radius:6px;cursor:pointer;font-size:13px}
.btn-retry:hover{background:#0f8a8f}
.footer{text-align:center;padding:20px;color:#94a3b8;font-size:12px;line-height:1.6}
.footer a{color:#0d7377;text-decoration:none}
.footer a:hover{text-decoration:underline}
@media(max-width:600px){
  .header h1{font-size:16px}
  .kelas-header{padding:12px 14px}
  .kelas-header .kode{font-size:14px;padding:3px 12px}
  td,th{padding:8px 14px;font-size:13px}
  .content{padding:12px 8px}
}
</style>
</head>
<body>

<div class="header">
  <h1>PEMBAGIAN KELAS SISWA BARU</h1>
  <div class="sub">SMP ABBS SURAKARTA — TAHUN AJARAN 2026/2027</div>
</div>

<div class="stats-bar" id="stats-bar">
  <span class="stat-item">Memuat data...</span>
</div>

<div class="content" id="content">
  <div class="loading">
    <div class="spinner"></div>
    <div class="loading-text">Memuat data pembagian kelas...</div>
  </div>
</div>

<div class="footer" id="footer"></div>

<script>
const RAW_URL = 'https://raw.githubusercontent.com/smpabbs/pps-pembagian-kelas/main/data.json';

let data = null;
let isLoading = true;
let loadError = null;

function parseDate(str) {
  if (!str) return 99999999;
  const parts = str.split('/');
  if (parts.length === 3) return parseInt(parts[2])*10000 + parseInt(parts[1])*100 + parseInt(parts[0]);
  return 99999999;
}
function dateSort(a,b) { return parseDate(a.tgl_daftar) - parseDate(b.tgl_daftar); }

function calculateClasses(siswa) {
  const putra = siswa.filter(s => s.program.endsWith('-L')).sort(dateSort);
  const putri = siswa.filter(s => s.program.endsWith('-P')).sort(dateSort);
  const ict_l = putra.filter(s => s.program === 'ICT-L');
  const tcp_l = putra.filter(s => s.program === 'TCP-L');
  const vcp_l = putra.filter(s => s.program === 'VCP-L');
  const ict_p = putri.filter(s => s.program === 'ICT-P');
  const tcp_p = putri.filter(s => s.program === 'TCP-P');
  const vcp_p = putri.filter(s => s.program === 'VCP-P');
  return {
    '7A': [...ict_l.slice(0,26), ...vcp_l.slice(0,3)],
    '7B': [...ict_l.slice(26,52), ...vcp_l.slice(3,6)],
    '7C': [...ict_l.slice(52), ...tcp_l, ...vcp_l.slice(6)],
    '7D': [...ict_p],
    '7E': [...tcp_p, ...vcp_p]
  };
}

const KELAS_INFO = {
  '7A': { label: 'Putra 1', color: '#0d7377' },
  '7B': { label: 'Putra 2', color: '#1a6b8a' },
  '7C': { label: 'Putra 3', color: '#2a5a2a' },
  '7D': { label: 'Putri 1', color: '#b45309' },
  '7E': { label: 'Putri 2', color: '#7c3aed' }
};
const KELAS_ORDER = ['7A','7B','7C','7D','7E'];

async function fetchData() {
  isLoading = true;
  loadError = null;
  render();
  try {
    const r = await fetch(RAW_URL);
    if (!r.ok) throw new Error('Gagal memuat data (HTTP ' + r.status + ')');
    data = await r.json();
    isLoading = false;
    render();
  } catch(e) {
    isLoading = false;
    loadError = e.message;
    render();
  }
}

function render() {
  const container = document.getElementById('content');
  const statsBar = document.getElementById('stats-bar');
  const footer = document.getElementById('footer');

  if (isLoading) {
    container.innerHTML = '<div class="loading"><div class="spinner"></div><div class="loading-text">Memuat data pembagian kelas...</div></div>';
    statsBar.innerHTML = '<span class="stat-item">Memuat...</span>';
    footer.innerHTML = '';
    return;
  }

  if (loadError) {
    container.innerHTML = '<div class="error"><div class="error-icon">⚠️</div><div class="error-text">Gagal memuat data</div><div class="error-detail">' + loadError + '</div><button class="btn-retry" onclick="fetchData()">🔄 Coba Lagi</button></div>';
    statsBar.innerHTML = '<span class="stat-item">⚠️ Gagal memuat</span>';
    footer.innerHTML = '';
    return;
  }

  if (!data || !data.siswa || !data.siswa.length) {
    container.innerHTML = '<div class="error"><div class="error-text">Data siswa tidak tersedia</div></div>';
    return;
  }

  const kelas = calculateClasses(data.siswa);
  const total = data.total || data.siswa.length;

  // Stats bar
  statsBar.innerHTML =
    '<span class="stat-item">Total: <strong>' + total + '</strong> siswa</span>' +
    '<span class="stat-item">L: <strong>' + (data.l_count || '-') + '</strong></span>' +
    '<span class="stat-item">P: <strong>' + (data.p_count || '-') + '</strong></span>' +
    '<span class="stat-item">Kelas: <strong>7A – 7E</strong></span>';

  let html = '';
  let allOpen = true;

  for (const k of KELAS_ORDER) {
    const students = kelas[k] || [];
    const info = KELAS_INFO[k];
    const totalKelas = KELAS_ORDER.reduce((sum, kk) => sum + (kelas[kk]?.length || 0), 0);

    let rows = '';
    students.forEach((s, i) => {
      rows += '<tr><td class="number-col">' + (i + 1) + '</td><td><strong>' + s.nama + '</strong></td></tr>';
    });

    html += '<div class="kelas-card' + (allOpen ? ' open' : '') + '" id="kelas-' + k + '">' +
      '<div class="kelas-header" onclick="toggleKelas(\'' + k + '\')">' +
        '<div class="kiri">' +
          '<span class="kode" style="background:' + info.color + '">' + k + '</span>' +
          '<span class="info">' + info.label + ' — ' + students.length + ' siswa</span>' +
        '</div>' +
        '<span class="arrow">▼</span>' +
      '</div>' +
      '<div class="kelas-body">' +
        '<table><thead><tr><th style="width:40px">No</th><th>Nama Siswa</th></tr></thead><tbody>' +
        rows +
        '</tbody></table>' +
      '</div>' +
    '</div>';
  }

  container.innerHTML = html;

  // Footer
  footer.innerHTML =
    'Data diperbaharui: ' + (data.per_tanggal || '-') +
    '<br><a href="https://pps2627.vercel.app" target="_blank">✏️ Admin PPS</a>';
}

function toggleKelas(k) {
  document.getElementById('kelas-' + k).classList.toggle('open');
}

fetchData();
</script>
</body>
</html>
